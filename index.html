<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for Mental Wellness | HeadsUpGuys × IPFS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/logo-pine.png">
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <div class="logo">
                <img src="assets/logo-pine.png" alt="Logo" class="logo-icon">
                <span class="hug-logo">HeadsUpGuys</span>
                <span class="divider">×</span>
                <span class="ipfs-logo">Iberian Pacific</span>
            </div>
            <nav class="top-nav">
                <a href="https://headsupguys.org" target="_blank">HeadsUpGuys.org</a>
            </nav>
        </div>
    </header>

    <main id="app">
        <div class="course-container">
            <div id="progress-container" class="progress-bar">
                <!-- Segments will be generated by JS -->
            </div>

            <div id="content-area" class="content-card">
                <!-- Chapter content will be injected here -->
                <div class="loader">Loading course content...</div>
            </div>

            <div class="navigation-footer">
                <button id="prev-btn" class="nav-btn secondary" disabled>Previous</button>
                <button id="next-btn" class="nav-btn primary">Start Course</button>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p>© 2024 HeadsUpGuys × Iberian Pacific Financial Services</p>
            <p class="disclaimer">This course is for educational purposes only and does not constitute financial, legal, or medical advice.</p>
        </div>
    </footer>

    <script src="content.js"></script>
    <script src="script.js"></script>

</html>
